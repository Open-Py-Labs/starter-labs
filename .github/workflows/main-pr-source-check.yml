name: Main Branch PR Source Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main

jobs:
  validate-source-branch:
    name: Require dev branch source
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "::error::Pull Requests to 'main' must originate from 'dev'. Current source: '${{ github.head_ref }}'"
            exit 1
          fi
          echo "Source branch is 'dev'. PR allowed!"